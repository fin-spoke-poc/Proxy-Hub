name: Proxy SecOps Secret Scan

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Artifact name used for the secret scan report.
        required: false
        type: string
        default: secret-scan-report
      fail_on_findings:
        description: Fail the workflow when findings are present.
        required: false
        type: boolean
        default: true
      test_mode:
        description: Run the upstream workflow in contract-test mode.
        required: false
        type: boolean
        default: false
    outputs:
      findings_count:
        description: Number of findings discovered by the upstream scan.
        value: ${{ jobs.upstream.outputs.findings_count }}
      result:
        description: Overall workflow result from the upstream workflow.
        value: ${{ jobs.upstream.outputs.result }}

permissions:
  contents: read

jobs:
  upstream:
    permissions:
      contents: read
    uses: fin-hub-poc/SecOps/.github/workflows/secret-scan.yml@v1
    with:
      artifact_name: ${{ inputs.artifact_name }}
      fail_on_findings: ${{ inputs.fail_on_findings }}
      test_mode: ${{ inputs.test_mode }}
    secrets: inherit
