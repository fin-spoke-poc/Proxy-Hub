name: Validate Proxy Workflows

on:
  pull_request:
    branches:
    - main
  workflow_dispatch:


permissions:
  contents: read

jobs:
  lint:
    name: "Linter"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Lint GitHub workflows
      uses: raven-actions/actionlint@v2

  validate_proxy_contracts:
    name: "Validate Proxy Workflow Contracts"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Validate proxy workflow map and pinned refs
      shell: bash
      run: |
        set -euo pipefail

        manifest="manifests/workflow-map.yaml"
        workflows=(.github/workflows/*-proxy.yml)

        test -f "$manifest"

        for workflow in "${workflows[@]}"; do
          test -f "$workflow"
          grep -Fq "file: $workflow" "$manifest"

          uses_line="$(grep -E '^[[:space:]]+uses: .+/.github/workflows/.+@[^[:space:]]+$' "$workflow" | head -n 1)"
          test -n "$uses_line"

          uses_ref="${uses_line##*@}"
          manifest_ref="$(awk -v file="$workflow" '
            $1 == "file:" && $2 == file { matched = 1; next }
            matched && $1 == "upstream_ref:" { print $2; exit }
          ' "$manifest")"

          test -n "$manifest_ref"

          if [[ ! "$uses_ref" =~ ^(main|v[0-9]+)$ ]]; then
            echo "Proxy workflow $workflow must reference @main during bootstrap or a floating major tag like @v1."
            exit 1
          fi

          if [[ "$uses_ref" == "master" ]]; then
            echo "Proxy workflow $workflow must not reference @master."
            exit 1
          fi

          if [[ "$uses_ref" != "$manifest_ref" ]]; then
            echo "Proxy workflow $workflow uses @$uses_ref but workflow-map.yaml records @$manifest_ref."
            exit 1
          fi
        done

        grep -Fq 'upstream_repo: fin-hub-poc/SecOps' "$manifest"

    - name: Verify release workflow exists
      shell: bash
      run: |
        set -euo pipefail
        test -f .github/workflows/release.yml
        grep -Fq 'Version must match the pattern vX.Y.Z.' .github/workflows/release.yml
